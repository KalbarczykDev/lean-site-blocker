<!doctype html>
<html>
  <head>
    <title>Simple Website Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <h3>Blocked Websites</h3>
    <div class="input-row">
      <input id="siteInput" type="text" placeholder="e.g. facebook.com" />
      <button id="addButton">Add</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <ul id="siteList"></ul>
    <p class="twitter-banner">
      Feedback or ideas?
      <a href="https://twitter.com/KalbarczykDev" target="_blank"
        >@KalbarczykDev</a
      >
      on Twitter/X
    </p>
    <a class="bmc" href="https://buymeacoffee.com/mxmhcep99p" target="_blank">
      <img
        src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png"
        alt="Buy Me A Coffee"
      />
    </a>
    <script src="popup.js"></script>
  </body>
</html>
